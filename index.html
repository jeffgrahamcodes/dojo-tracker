<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dojo Tracker — Daily Learning</title>
  <style>
    :root {
      --text-primary: #1a1a1a;
      --text-secondary: #666666;
      --text-muted: #999999;
      --text-accent: #ffffff;
      --surface-1: #f5f5f5;
      --surface-2: #fafafa;
      --bg-accent: #2c5aa0;
      --border: #e0e0e0;
      --border-accent: #2c5aa0;
      --fill-accent: #2c5aa0;
      --fill-success: #22c55e;
      --on-accent: #ffffff;
      --radius: 8px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --text-primary: #e5e5e5;
        --text-secondary: #b0b0b0;
        --text-muted: #808080;
        --surface-1: #1a1a1a;
        --surface-2: #242424;
        --bg-accent: #3b5baa;
        --border: #3a3a3a;
        --border-accent: #3b5baa;
        --fill-accent: #3b5baa;
        --fill-success: #22c55e;
        --on-accent: #ffffff;
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
      color: var(--text-primary);
      padding: 20px;
      line-height: 1.5;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: #0f0f0f;
      }
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
    }

    .header {
      margin-bottom: 1.5rem;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 0.25rem;
      color: var(--text-primary);
    }

    .header-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .tab-buttons {
      display: flex;
      gap: 8px;
    }

    .tab-btn {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface-2);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      transition: all 0.15s;
    }

    .tab-btn.active {
      border-color: var(--border-accent);
      background: var(--bg-accent);
      color: var(--text-accent);
    }

    .nav-buttons {
      display: flex;
      gap: 8px;
    }

    .nav-btn {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface-2);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.15s;
    }

    .today-card {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 1.5rem;
    }

    .today-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 12px;
    }

    .today-header label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .today-minutes {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .progress-bar {
      position: relative;
      height: 8px;
      background: var(--surface-1);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .progress-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.2s ease;
      background: var(--fill-accent);
    }

    .progress-labels {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-muted);
    }

    .day-picker {
      display: flex;
      gap: 6px;
      margin-bottom: 1.5rem;
      overflow-x: auto;
      padding-bottom: 8px;
      -webkit-overflow-scrolling: touch;
    }

    .day-btn {
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface-2);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-primary);
      min-width: 56px;
      text-align: center;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .day-btn:hover {
      border-color: var(--border-accent);
    }

    .day-btn.selected {
      border: 2px solid var(--border-accent);
      background: var(--bg-accent);
      color: var(--text-accent);
    }

    .day-btn div:first-child {
      font-size: 12px;
      font-weight: 600;
    }

    .day-btn div:nth-child(2) {
      font-size: 11px;
      opacity: 0.7;
      margin-top: 2px;
    }

    .day-btn div:nth-child(3) {
      font-size: 10px;
      margin-top: 4px;
      opacity: 0.8;
    }

    .courses {
      display: grid;
      gap: 12px;
      margin-bottom: 1.5rem;
    }

    .course-card {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
    }

    .course-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
    }

    .course-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .course-minutes {
      font-size: 14px;
      font-weight: 600;
    }

    .quick-buttons {
      display: flex;
      gap: 6px;
    }

    .quick-btn {
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: transparent;
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
      flex: 1;
      transition: all 0.15s;
      color: var(--text-secondary);
    }

    .quick-btn:hover {
      border-color: var(--border-accent);
    }

    .quick-btn.active {
      background: var(--fill-accent);
      color: var(--on-accent);
      border-color: var(--fill-accent);
    }

    .weekly-summary {
      border-top: 1px solid var(--border);
      padding-top: 1rem;
    }

    .weekly-summary h2 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 12px;
    }

    .weekly-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 12px;
    }

    .weekly-card {
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
    }

    .weekly-card-label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .weekly-card-total {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .weekly-card-avg {
      font-size: 11px;
      color: var(--text-muted);
    }

    .week-total-card {
      padding: 14px;
      background: var(--bg-accent);
      border: 1px solid var(--border-accent);
      border-radius: var(--radius);
      text-align: center;
      color: var(--on-accent);
    }

    .week-total-label {
      font-size: 12px;
      margin-bottom: 6px;
      opacity: 0.9;
    }

    .week-total-number {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .week-total-note {
      font-size: 11px;
      opacity: 0.85;
    }

    .analytics-section {
      margin-bottom: 2rem;
    }

    .analytics-section h3 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 12px;
    }

    .chart-bar {
      margin-bottom: 12px;
    }

    .chart-bar-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
      font-size: 12px;
    }

    .chart-bar-container {
      height: 8px;
      background: var(--surface-2);
      border-radius: 4px;
      overflow: hidden;
    }

    .chart-bar-fill {
      height: 100%;
      background: var(--fill-accent);
      border-radius: 4px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .stat-card {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      text-align: center;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .stat-number {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .stat-note {
      font-size: 11px;
      color: var(--text-muted);
    }

    .table-container {
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      font-size: 12px;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      padding: 8px 0;
      color: var(--text-secondary);
      font-weight: 500;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 8px 0;
      color: var(--text-primary);
      border-bottom: 1px solid var(--border);
    }

    th:not(:first-child), td:not(:first-child) {
      text-align: right;
    }

    @media (max-width: 480px) {
      body {
        padding: 16px;
      }

      .header-controls {
        flex-direction: column;
        gap: 12px;
        align-items: flex-start;
      }

      .weekly-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-controls">
        <div>
          <h1>Dojo Tracker</h1>
          <p id="weekLabel" style="font-size: 13px; color: var(--text-secondary); margin: 0.25rem 0 0 0;">Week of Jul 1</p>
        </div>
        <div style="display: flex; gap: 8px; align-items: center;">
          <div class="tab-buttons">
            <button id="trackerTabBtn" class="tab-btn active">Tracker</button>
            <button id="analyticsTabBtn" class="tab-btn">Analytics</button>
          </div>
          <div class="nav-buttons" id="navButtons">
            <button id="prevWeekBtn" class="nav-btn">← Prev</button>
            <button id="nextWeekBtn" class="nav-btn">Next →</button>
          </div>
        </div>
      </div>
    </div>

    <div id="trackerView">
      <div class="today-card">
        <div class="today-header">
          <label>Today's total</label>
          <span class="today-minutes" id="todayTotal">0 min</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-labels">
          <span>0 min</span>
          <span id="targetMid">37.5 min</span>
          <span id="targetMax">45 min</span>
        </div>
      </div>

      <div class="day-picker" id="dayPicker"></div>

      <div class="courses" id="courses"></div>

      <div class="weekly-summary">
        <h2>Weekly totals</h2>
        <div class="weekly-grid" id="weeklyCards"></div>
        <div class="week-total-card">
          <div class="week-total-label">Week total</div>
          <div class="week-total-number" id="weekTotal">0h 0m</div>
          <div class="week-total-note">Target: 4.5–5.5 hours per week</div>
        </div>
      </div>
    </div>

    <div id="analyticsView" style="display: none;">
      <div class="weekly-summary" style="border-top: none; padding-top: 0;">
        <h2>Historical Analytics</h2>
        
        <div class="analytics-section">
          <h3>Weekly Progression</h3>
          <div id="weeklyChart"></div>
        </div>

        <div class="analytics-section">
          <h3>Course Investment (Latest Week)</h3>
          <div class="weekly-grid" id="courseBreakdown"></div>
        </div>

        <div class="analytics-section">
          <h3>Consistency</h3>
          <div class="stats-grid" id="consistencyStats"></div>
        </div>

        <div class="analytics-section">
          <h3>All Weeks</h3>
          <div class="table-container" id="allWeeksTable"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const courses = [
      { id: 'ztm', name: 'ZTM AI/ML Engineer', color: '#3987e5' },
      { id: 'boot', name: 'Boot.dev', color: '#1baf7a' },
      { id: 'cantrill', name: 'Cantrill AWS', color: '#e87ba4' },
      { id: 'cs50', name: 'Harvard CS50', color: '#eda100' }
    ];

    const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    let data = {};
    let selectedDate = null;
    let currentWeekStart = null;
    let currentView = 'tracker';

    function getSundayOfWeek(date) {
      let d;
      
      // Handle both Date objects and ISO string inputs
      if (typeof date === 'string') {
        const parts = date.split('-');
        const year = parseInt(parts[0]);
        const month = parseInt(parts[1]) - 1;
        const day = parseInt(parts[2]);
        d = new Date(year, month, day);
      } else {
        d = new Date(date);
      }
      
      const dayOfWeek = d.getDay();
      d.setDate(d.getDate() - dayOfWeek);
      return d;
    }

    function getWeekDates(sunday) {
      const dates = [];
      for (let i = 0; i < 7; i++) {
        const date = new Date(sunday);
        date.setDate(sunday.getDate() + i);
        // Format in local timezone instead of using toISOString() which converts to UTC
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        const key = `${year}-${month}-${day}`;
        if (!data[key]) {
          data[key] = courses.reduce((acc, c) => ({ ...acc, [c.id]: 0 }), {});
        }
        dates.push(key);
      }
      return dates;
    }

    function initData() {
      const stored = localStorage.getItem('dojo-tracker-data');
      if (stored) {
        data = JSON.parse(stored);
      } else {
        const today = new Date();
        const sunday = getSundayOfWeek(today);
        for (let i = 0; i < 7; i++) {
          const date = new Date(sunday);
          date.setDate(sunday.getDate() + i);
          const year = date.getFullYear();
          const month = String(date.getMonth() + 1).padStart(2, '0');
          const day = String(date.getDate()).padStart(2, '0');
          const key = `${year}-${month}-${day}`;
          data[key] = courses.reduce((acc, c) => ({ ...acc, [c.id]: 0 }), {});
        }
      }
      
      currentWeekStart = getSundayOfWeek(new Date());
      const today = new Date();
      const year = today.getFullYear();
      const month = String(today.getMonth() + 1).padStart(2, '0');
      const day = String(today.getDate()).padStart(2, '0');
      selectedDate = `${year}-${month}-${day}`;
    }

    function saveData() {
      localStorage.setItem('dojo-tracker-data', JSON.stringify(data));
    }

    function getDateList() {
      return getWeekDates(currentWeekStart).sort();
    }

    function getDayIndex(date) {
      return getDateList().indexOf(date);
    }

    function isWeekend(date) {
      const idx = getDayIndex(date);
      return idx === 0 || idx === 6;
    }

    function getTargets(date) {
      return isWeekend(date) ? { min: 60, max: 75 } : { min: 30, max: 45 };
    }

    function getDayTotal(date) {
      return courses.reduce((sum, c) => sum + (data[date][c.id] || 0), 0);
    }

    function getCourseTotal(courseId) {
      return getDateList().reduce((sum, date) => sum + (data[date][courseId] || 0), 0);
    }

    function getWeekTotal() {
      return getDateList().reduce((sum, date) => sum + getDayTotal(date), 0);
    }

    function isCurrentWeek() {
      const today = getSundayOfWeek(new Date());
      return currentWeekStart.getTime() === today.getTime();
    }

    function goToPreviousWeek() {
      const prev = new Date(currentWeekStart);
      prev.setDate(prev.getDate() - 7);
      currentWeekStart = prev;
      selectedDate = getWeekDates(currentWeekStart)[0];
      render();
    }

    function goToNextWeek() {
      if (!isCurrentWeek()) {
        const next = new Date(currentWeekStart);
        next.setDate(next.getDate() + 7);
        currentWeekStart = next;
        selectedDate = getWeekDates(currentWeekStart)[0];
        render();
      }
    }

    function renderDayPicker() {
      const picker = document.getElementById('dayPicker');
      picker.innerHTML = '';
      
      getDateList().forEach((date, idx) => {
        const dayTotal = getDayTotal(date);
        const targets = getTargets(date);
        const hit = dayTotal >= targets.min;
        const dayOfMonth = parseInt(date.split('-')[2]);
        
        const btn = document.createElement('button');
        btn.className = 'day-btn' + (date === selectedDate ? ' selected' : '');
        btn.innerHTML = `
          <div>${dayNames[idx]}</div>
          <div>${dayOfMonth}</div>
          <div>${dayTotal}m ${hit ? '✓' : ''}</div>
        `;
        btn.onclick = () => { selectedDate = date; render(); };
        picker.appendChild(btn);
      });
    }

    function renderCourses() {
      const container = document.getElementById('courses');
      container.innerHTML = '';
      
      courses.forEach(course => {
        const minutes = data[selectedDate][course.id] || 0;
        
        const card = document.createElement('div');
        card.className = 'course-card';
        card.innerHTML = `
          <div class="course-header">
            <label class="course-name">${course.name}</label>
            <span class="course-minutes" style="color: ${course.color};">${minutes} min</span>
          </div>
          <div class="quick-buttons">
            ${[0, 10, 15, 20, 25, 30].map(val => `<button class="quick-btn${minutes === val ? ' active' : ''}" data-val="${val}">${val}</button>`).join('')}
          </div>
        `;
        
        card.querySelectorAll('.quick-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const val = parseInt(btn.getAttribute('data-val'));
            data[selectedDate][course.id] = val;
            saveData();
            render();
          });
        });
        
        container.appendChild(card);
      });
    }

    function renderWeeklySummary() {
      const grid = document.getElementById('weeklyCards');
      grid.innerHTML = '';
      
      courses.forEach(course => {
        const total = getCourseTotal(course.id);
        const hours = Math.floor(total / 60);
        const mins = total % 60;
        
        const card = document.createElement('div');
        card.className = 'weekly-card';
        card.innerHTML = `
          <div class="weekly-card-label">${course.name}</div>
          <div class="weekly-card-total">${hours}h ${mins}m</div>
          <div class="weekly-card-avg">${(total / 7).toFixed(0)} min/day</div>
        `;
        grid.appendChild(card);
      });
      
      const total = getWeekTotal();
      const hours = Math.floor(total / 60);
      const mins = total % 60;
      document.getElementById('weekTotal').textContent = `${hours}h ${mins}m`;
    }

    function getAllWeeks() {
      const weeks = {};
      Object.keys(data).sort().forEach(dateStr => {
        const parts = dateStr.split('-');
        const year = parseInt(parts[0]);
        const month = parseInt(parts[1]) - 1;
        const day = parseInt(parts[2]);
        const d = new Date(year, month, day);
        const sunday = getSundayOfWeek(d);
        const sunYear = sunday.getFullYear();
        const sunMonth = String(sunday.getMonth() + 1).padStart(2, '0');
        const sunDay = String(sunday.getDate()).padStart(2, '0');
        const weekKey = `${sunYear}-${sunMonth}-${sunDay}`;
        if (!weeks[weekKey]) {
          weeks[weekKey] = [];
        }
        weeks[weekKey].push(dateStr);
      });
      return weeks;
    }

    function renderAnalytics() {
      const allWeeks = getAllWeeks();
      const stats = [];
      
      Object.keys(allWeeks).sort().reverse().forEach(weekKey => {
        const dateStrs = allWeeks[weekKey];
        const weekTotal = dateStrs.reduce((sum, d) => sum + getDayTotal(d), 0);
        const daysHitTarget = dateStrs.filter(d => {
          const targets = getTargets(d);
          return getDayTotal(d) >= targets.min;
        }).length;
        
        stats.push({
          week: weekKey,
          total: weekTotal,
          daysHitTarget: daysHitTarget,
          dates: dateStrs
        });
      });
      
      // Weekly progression chart
      const chartDiv = document.getElementById('weeklyChart');
      const maxTotal = Math.max(...stats.map(s => s.total), 300);
      const chartHTML = stats.map(s => {
        const d = new Date(s.week + 'T00:00');
        const weekStart = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        const hours = Math.floor(s.total / 60);
        const mins = s.total % 60;
        const pct = (s.total / maxTotal) * 100;
        return `
          <div class="chart-bar">
            <div class="chart-bar-label">
              <span>${weekStart}</span>
              <span>${hours}h ${mins}m</span>
            </div>
            <div class="chart-bar-container">
              <div class="chart-bar-fill" style="width: ${pct}%"></div>
            </div>
          </div>
        `;
      }).join('');
      chartDiv.innerHTML = chartHTML || '<p style="color: var(--text-muted);">No data yet</p>';
      
      // Course breakdown - latest week
      const breakdown = document.getElementById('courseBreakdown');
      if (stats.length > 0) {
        const latestWeek = stats[0];
        breakdown.innerHTML = courses.map(c => {
          const total = latestWeek.dates.reduce((sum, d) => sum + (data[d][c.id] || 0), 0);
          const hours = Math.floor(total / 60);
          const mins = total % 60;
          return `
            <div class="weekly-card">
              <div class="weekly-card-label">${c.name}</div>
              <div class="weekly-card-total" style="color: ${c.color};">${hours}h ${mins}m</div>
              <div class="weekly-card-avg">Latest week</div>
            </div>
          `;
        }).join('');
      }
      
      // Consistency stats
      const consistency = document.getElementById('consistencyStats');
      const totalDays = stats.reduce((sum, s) => sum + s.daysHitTarget, 0);
      const totalPossible = stats.length * 7;
      const consistencyPct = totalPossible > 0 ? Math.round((totalDays / totalPossible) * 100) : 0;
      const avgWeekly = stats.length > 0 ? (stats.reduce((sum, s) => sum + s.total, 0) / stats.length / 60).toFixed(1) : 0;
      
      consistency.innerHTML = `
        <div class="stat-card">
          <div class="stat-label">Hit Target</div>
          <div class="stat-number" style="color: var(--fill-success);">${consistencyPct}%</div>
          <div class="stat-note">${totalDays} of ${totalPossible} days</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Weekly Avg</div>
          <div class="stat-number" style="color: var(--fill-accent);">${avgWeekly}h</div>
          <div class="stat-note">Target: 4.5-5.5h</div>
        </div>
      `;
      
      // All weeks table
      const allWeeksTableDiv = document.getElementById('allWeeksTable');
      const tableHTML = `
        <table>
          <tr>
            <th>Week</th>
            <th>Total</th>
            <th>Days Hit</th>
          </tr>
          ${stats.map(s => {
            const d = new Date(s.week + 'T00:00');
            const weekStart = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            const hours = Math.floor(s.total / 60);
            const mins = s.total % 60;
            return `
              <tr>
                <td>${weekStart}</td>
                <td>${hours}h ${mins}m</td>
                <td style="color: ${s.daysHitTarget >= 5 ? 'var(--fill-success)' : 'var(--text-secondary)'};">${s.daysHitTarget}/7</td>
              </tr>
            `;
          }).join('')}
        </table>
      `;
      allWeeksTableDiv.innerHTML = tableHTML;
    }

    function render() {
      const targets = getTargets(selectedDate);
      const weekStart = new Date(currentWeekStart);
      const weekEnd = new Date(currentWeekStart);
      weekEnd.setDate(weekEnd.getDate() + 6);
      
      const startStr = weekStart.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      const endStr = weekEnd.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      document.getElementById('weekLabel').textContent = `Week of ${startStr} – ${endStr}`;
      
      document.getElementById('targetMid').textContent = `${(targets.min + targets.max) / 2} min`;
      document.getElementById('targetMax').textContent = `${targets.max} min`;
      
      const nextBtn = document.getElementById('nextWeekBtn');
      nextBtn.disabled = isCurrentWeek();
      nextBtn.style.opacity = isCurrentWeek() ? '0.5' : '1';
      
      const todayTotal = getDayTotal(selectedDate);
      const displayMax = Math.max(targets.max, todayTotal);
      const pct = (todayTotal / displayMax) * 100;
      const meetsTarget = todayTotal >= targets.min;
      
      document.getElementById('todayTotal').textContent = `${todayTotal} min`;
      const fill = document.getElementById('progressFill');
      fill.style.width = pct + '%';
      fill.style.background = meetsTarget ? '#22c55e' : '#2c5aa0';
      
      renderDayPicker();
      renderCourses();
      renderWeeklySummary();
    }

    function switchView(view) {
      currentView = view;
      const trackerView = document.getElementById('trackerView');
      const analyticsView = document.getElementById('analyticsView');
      const trackerBtn = document.getElementById('trackerTabBtn');
      const analyticsBtn = document.getElementById('analyticsTabBtn');
      const navButtons = document.getElementById('navButtons');
      
      if (view === 'tracker') {
        trackerView.style.display = 'block';
        analyticsView.style.display = 'none';
        trackerBtn.classList.add('active');
        analyticsBtn.classList.remove('active');
        navButtons.style.display = 'flex';
        document.getElementById('weekLabel').style.display = 'block';
      } else {
        trackerView.style.display = 'none';
        analyticsView.style.display = 'block';
        trackerBtn.classList.remove('active');
        analyticsBtn.classList.add('active');
        navButtons.style.display = 'none';
        document.getElementById('weekLabel').style.display = 'none';
        renderAnalytics();
      }
    }

    initData();
    render();
    
    document.getElementById('trackerTabBtn').addEventListener('click', () => switchView('tracker'));
    document.getElementById('analyticsTabBtn').addEventListener('click', () => switchView('analytics'));
    document.getElementById('prevWeekBtn').addEventListener('click', goToPreviousWeek);
    document.getElementById('nextWeekBtn').addEventListener('click', goToNextWeek);
  </script>
</body>
</html>
